<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="navbar">
<h2>CMR Complaint System</h2>
<div>
<a href="/add">Add</a>
<a href="/logout">Logout</a>
</div>
</div>

<div class="banner"></div>

<div class="container">

<div class="card">
<h3>Welcome {{session['user']}}</h3>
</div>

<div class="card">
<h3>Your Complaints</h3>

<table>
<tr><th>ID</th><th>Title</th><th>Status</th></tr>

{% for c in complaints %}
<tr>
<td>{{c.id}}</td>
<td>{{c.title}}</td>
<td>{{c.status}}</td>
</tr>
{% endfor %}

</table>

</div>

</div>

</body>
</html>
